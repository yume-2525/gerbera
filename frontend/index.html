<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1, viewport-fit=cover" />
  <title>RescuAR - 店舗×QR AR</title>
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jsQR: QRコード検出ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* カメラ・Canvasを画面全体に重ねるためのベース */
    html, body { margin: 0; padding: 0; overflow: hidden; touch-action: none; }
    #app { position: relative; width: 100vw; height: 100vh; background: #000; }
    /* 非表示のvideo・検出用canvasはレイアウトに影響させない */
    #videoEl { display: none; }
    #detectCanvas { position: absolute; left: -9999px; top: 0; }
    /* カメラ表示用Canvas（videoの代わりにここに描画） */
    #cameraCanvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; }
    /* ARオーバーレイ用Canvas（手前） */
    #overlayCanvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; }
  </style>
</head>
<body class="bg-black">
  <div id="app" class="w-full h-full relative">
    <!-- 背面カメラ映像用（非表示）。ストリームはここに流し、検出用・表示用Canvasに描画する -->
    <video id="videoEl" playsinline muted autoplay></video>
    <!-- 検出用Canvas（低解像度）。jsQRはこのImageDataを解析する。非表示 -->
    <canvas id="detectCanvas"></canvas>
    <!-- カメラ映像を表示するCanvas（videoの代わり。軽量に1枚で表示） -->
    <canvas id="cameraCanvas"></canvas>
    <!-- AR描画用オーバーレイ（赤枠・値札タグを描く） -->
    <canvas id="overlayCanvas"></canvas>
    <!-- ローディング表示（カメラ起動前） -->
    <div id="loading" class="absolute inset-0 flex items-center justify-center bg-black/80 z-10">
      <p class="text-white text-lg">カメラを起動しています...</p>
    </div>
  </div>

  <script>
(function() {
  'use strict';

  // ========== DOM・定数 ==========
  const videoEl = document.getElementById('videoEl');
  const detectCanvas = document.getElementById('detectCanvas');
  const detectCtx = detectCanvas.getContext('2d');
  const cameraCanvas = document.getElementById('cameraCanvas');
  const cameraCtx = cameraCanvas.getContext('2d');
  const overlayCanvas = document.getElementById('overlayCanvas');
  const overlayCtx = overlayCanvas.getContext('2d');
  const loadingEl = document.getElementById('loading');

  /** 検出用Canvasの幅（低解像度でフレームレート確保） */
  const DETECT_WIDTH = 320;
  /** 線形補間の係数: smoothed = last * LERP_OLD + current * LERP_NEW → 0.7と0.3で滑らか追従 */
  const LERP_OLD = 0.7;
  const LERP_NEW = 0.3;
  /** QRが見えなくなってからARタグを消すまでの時間（ミリ秒） */
  const AR_TIMEOUT_MS = 500;

  // ========== 座標変換用のキャッシュ（リサイズ時に再計算） ==========
  let viewW = 0, viewH = 0;
  let detectW = 0, detectH = 0;
  /** 検出Canvas → 表示座標へのスケール（アスペクト比一致時は同じ） */
  let scaleX = 1, scaleY = 1;
  /** 検出Canvasを表示エリアに中央クロップで合わせる際のオフセット（ピクセル） */
  let offsetX = 0, offsetY = 0;

  /**
   * 表示エリアと検出エリアのアスペクト比を維持した中央クロップの変換パラメータを計算する。
   * 指針 3. に基づく厳密な計算。
   * 検出Canvasは view と同じアスペクト比にしておき、検出座標 → 表示座標は scale + offset で変換する。
   */
  function updateCoordinateTransform() {
    viewW = overlayCanvas.clientWidth;
    viewH = overlayCanvas.clientHeight;
    if (viewW <= 0 || viewH <= 0) return;

    const viewAspect = viewW / viewH;
    detectW = DETECT_WIDTH;
    detectH = Math.round(DETECT_WIDTH / viewAspect);

    detectCanvas.width = detectW;
    detectCanvas.height = detectH;
    cameraCanvas.width = viewW;
    cameraCanvas.height = viewH;
    overlayCanvas.width = viewW;
    overlayCanvas.height = viewH;

    // 検出と表示は同じアスペクト比なので、単純なスケールのみ（中央クロップのオフセットは0）
    scaleX = viewW / detectW;
    scaleY = viewH / detectH;
    offsetX = 0;
    offsetY = 0;
  }

  /**
   * 検出Canvas上の座標 (detectX, detectY) を表示Canvas（オーバーレイ）のピクセル座標に変換する。
   * 中央クロップ＋アスペクト比維持を前提とした式。
   */
  function detectToScreen(detectX, detectY) {
    return {
      x: detectX * scaleX + offsetX,
      y: detectY * scaleY + offsetY
    };
  }

  /**
   * QRの4隅（code.location）から中心点と回転角を算出する。
   * 回転角は上辺（topLeft → topRight）のベクトルから Math.atan2 で求める。
   */
  function getQRCenterAndAngle(location) {
    const tl = location.topLeftCorner;
    const tr = location.topRightCorner;
    const br = location.bottomRightCorner;
    const bl = location.bottomLeftCorner;
    const cx = (tl.x + tr.x + br.x + bl.x) / 4;
    const cy = (tl.y + tr.y + br.y + bl.y) / 4;
    const angle = Math.atan2(tr.y - tl.y, tr.x - tl.x);
    return { cx, cy, angle };
  }

  /** 線形補間（1次元） */
  function lerp(a, b, t) {
    return a * (1 - t) + b * t;
  }

  // ========== 複数QRトラッキング用の状態（Map で管理） ==========
  /**
   * 現在表示中の商品（QR）一覧。キー = QRデータ文字列 (code.data)、値 = 下記のオブジェクト。
   * 複数フレームに渡って検出結果を蓄積し、jsQR が1フレーム1個しか返さなくても複数QRを表示する。
   * @typedef {Object} ActiveProductEntry
   * @property {string} id - 商品ID（code.data と同一）
   * @property {{ name: string, price: number } | null} productInfo - バックエンドから取得したデータ（取得中は null）
   * @property {{ tl, tr, br, bl }} smoothedCorners - 補間済みの4隅の表示座標（各 {x,y}）
   * @property {number} smoothedCenterX
   * @property {number} smoothedCenterY
   * @property {number} smoothedAngle
   * @property {number} lastSeenTime - 最後に検出された時刻（performance.now()）
   * @property {boolean} isFetching - API問い合わせ中かどうか
   */
  const activeProducts = new Map();

  // ========== バックエンド連携（指針 6.） ==========
  /**
   * QRデータから商品情報を取得する。現状はダミーJSONを返す。
   * 相方: 実際のAPIでは GET /api/product/{id} や POST /api/product に qr_data を渡す想定。
   * 例: const API_BASE = 'https://your-api.example.com'; を定義し、
   *     fetch(`${API_BASE}/api/product/${encodeURIComponent(qrData)}`) に差し替え。
   * @param {string} qrData - QRコードの生データ（商品IDやURLが含まれる想定）
   * @returns {Promise<{ name: string, price: number }>}
   */
  async function fetchProductInfo(qrData) {
    // ダミー: 本番では await fetch(`${API_BASE}/api/product/...`) に差し替え
    await new Promise(r => setTimeout(r, 100));
    return { name: '幕の内弁当', price: 500 };
  }

  /**
   * カメラ映像を検出用Canvasに「中央クロップ」で描画する。
   * 検出Canvasと表示エリアのアスペクト比は一致させているので、同じクロップが画面表示と一致する。
   */
  function drawVideoToDetectCanvas() {
    const vw = videoEl.videoWidth;
    const vh = videoEl.videoHeight;
    if (vw <= 0 || vh <= 0) return;

    const videoAspect = vw / vh;
    const detectAspect = detectW / detectH;
    let sx = 0, sy = 0, sw = vw, sh = vh;

    if (detectAspect > videoAspect) {
      sh = vw / detectAspect;
      sy = (vh - sh) / 2;
    } else {
      sw = vh * detectAspect;
      sx = (vw - sw) / 2;
    }
    detectCtx.drawImage(videoEl, sx, sy, sw, sh, 0, 0, detectW, detectH);
  }

  /**
   * カメラ映像を表示用Canvasに中央クロップで描画する。
   */
  function drawVideoToCameraCanvas() {
    const vw = videoEl.videoWidth;
    const vh = videoEl.videoHeight;
    if (viewW <= 0 || viewH <= 0 || vw <= 0 || vh <= 0) return;

    const videoAspect = vw / vh;
    const viewAspect = viewW / viewH;
    let sx = 0, sy = 0, sw = vw, sh = vh;

    if (viewAspect > videoAspect) {
      sh = vw / viewAspect;
      sy = (vh - sh) / 2;
    } else {
      sw = vh * viewAspect;
      sx = (vw - sw) / 2;
    }
    cameraCtx.drawImage(videoEl, sx, sy, sw, sh, 0, 0, viewW, viewH);
  }

  /** 値札タグのサイズ・オフセット（複数QRで共通） */
  const TAG_OFFSET_Y = -56;
  const TAG_WIDTH = 160;
  const TAG_HEIGHT = 52;

  /**
   * 1商品分のAR描画（赤枠 + 値札タグ）。activeProducts の1エントリ用。
   */
  function drawSingleARTag(entry) {
    const { smoothedCorners, smoothedCenterX, smoothedCenterY, smoothedAngle, productInfo } = entry;
    const centerX = smoothedCenterX;
    const centerY = smoothedCenterY;
    const angle = smoothedAngle;

    // ----- 赤枠（QRの4隅を滑らか補間した座標で描画） -----
    if (smoothedCorners) {
      const { tl, tr, br, bl } = smoothedCorners;
      overlayCtx.strokeStyle = '#e11d48';
      overlayCtx.lineWidth = 4;
      overlayCtx.beginPath();
      overlayCtx.moveTo(tl.x, tl.y);
      overlayCtx.lineTo(tr.x, tr.y);
      overlayCtx.lineTo(br.x, br.y);
      overlayCtx.lineTo(bl.x, bl.y);
      overlayCtx.closePath();
      overlayCtx.stroke();
    }

    // ----- 値札タグ（中心より少し上） -----
    overlayCtx.save();
    overlayCtx.translate(centerX, centerY + TAG_OFFSET_Y);
    overlayCtx.rotate(angle);
    overlayCtx.translate(-TAG_WIDTH / 2, -TAG_HEIGHT / 2);

    const grad = overlayCtx.createLinearGradient(0, 0, TAG_WIDTH, 0);
    grad.addColorStop(0, '#dc2626');
    grad.addColorStop(0.5, '#ea580c');
    grad.addColorStop(1, '#ca8a04');
    overlayCtx.fillStyle = grad;
    overlayCtx.strokeStyle = '#fbbf24';
    overlayCtx.lineWidth = 2;
    roundRect(overlayCtx, 0, 0, TAG_WIDTH, TAG_HEIGHT, 8);
    overlayCtx.fill();
    overlayCtx.stroke();

    const name = (productInfo && productInfo.name) ? productInfo.name : '読み込み中...';
    const price = (productInfo && productInfo.price != null) ? '¥' + productInfo.price : '---';

    overlayCtx.fillStyle = '#fff';
    overlayCtx.font = 'bold 14px sans-serif';
    overlayCtx.textAlign = 'center';
    overlayCtx.fillText(name, TAG_WIDTH / 2, 20);
    overlayCtx.font = 'bold 18px sans-serif';
    overlayCtx.fillText(price, TAG_WIDTH / 2, 42);

    overlayCtx.restore();
  }

  /**
   * AR描画: activeProducts 内の全商品に対して赤枠と値札タグを描画する。
   * 複数QRが映っていてもそれぞれの座標に正しく追従する。
   */
  function drawAROverlay() {
    overlayCtx.clearRect(0, 0, viewW, viewH);
    for (const entry of activeProducts.values()) {
      drawSingleARTag(entry);
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  /**
   * メインの検出・描画ループ。requestAnimationFrame で低解像度 jsQR を回す。
   * jsQR は1フレームで1個のQRしか返さないため、複数フレームで検出されたQRを activeProducts Map に蓄積し、複数同時表示を実現する。
   */
  function tick() {
    if (!videoEl || videoEl.readyState < 2) {
      requestAnimationFrame(tick);
      return;
    }

    drawVideoToDetectCanvas();
    drawVideoToCameraCanvas();

    const imageData = detectCtx.getImageData(0, 0, detectW, detectH);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 1 });

    const now = performance.now();

    // ----- 検出時: このフレームで見つかった1個のQRを Map に追加 or 更新 -----
    if (code && code.location) {
      const qrId = code.data;
      const { cx, cy, angle } = getQRCenterAndAngle(code.location);
      const sc = detectToScreen(cx, cy);
      const tl = detectToScreen(code.location.topLeftCorner.x, code.location.topLeftCorner.y);
      const tr = detectToScreen(code.location.topRightCorner.x, code.location.topRightCorner.y);
      const br = detectToScreen(code.location.bottomRightCorner.x, code.location.bottomRightCorner.y);
      const bl = detectToScreen(code.location.bottomLeftCorner.x, code.location.bottomLeftCorner.y);

      let entry = activeProducts.get(qrId);

      if (entry) {
        // 既存エントリ: 座標を LERP で更新し、lastSeenTime を現在時刻に
        entry.smoothedCenterX = lerp(entry.smoothedCenterX, sc.x, LERP_NEW);
        entry.smoothedCenterY = lerp(entry.smoothedCenterY, sc.y, LERP_NEW);
        entry.smoothedAngle = lerp(entry.smoothedAngle, angle, LERP_NEW);
        entry.smoothedCorners = {
          tl: { x: lerp(entry.smoothedCorners.tl.x, tl.x, LERP_NEW), y: lerp(entry.smoothedCorners.tl.y, tl.y, LERP_NEW) },
          tr: { x: lerp(entry.smoothedCorners.tr.x, tr.x, LERP_NEW), y: lerp(entry.smoothedCorners.tr.y, tr.y, LERP_NEW) },
          br: { x: lerp(entry.smoothedCorners.br.x, br.x, LERP_NEW), y: lerp(entry.smoothedCorners.br.y, br.y, LERP_NEW) },
          bl: { x: lerp(entry.smoothedCorners.bl.x, bl.x, LERP_NEW), y: lerp(entry.smoothedCorners.bl.y, bl.y, LERP_NEW) }
        };
        entry.lastSeenTime = now;
      } else {
        // 新規エントリ: Map に追加し、fetchProductInfo を呼ぶ（二重リクエスト防止のため isFetching でガード）
        entry = {
          id: qrId,
          productInfo: null,
          smoothedCorners: { tl, tr, br, bl },
          smoothedCenterX: sc.x,
          smoothedCenterY: sc.y,
          smoothedAngle: angle,
          lastSeenTime: now,
          isFetching: true
        };
        activeProducts.set(qrId, entry);
        fetchProductInfo(qrId)
          .then(function(product) {
            entry.productInfo = product;
            entry.isFetching = false;
          })
          .catch(function() {
            entry.productInfo = { name: '取得失敗', price: null };
            entry.isFetching = false;
          });
      }
    }

    // ----- クリーンアップ: 一定時間検出されなかった商品を Map から削除 -----
    for (const [qrId, entry] of activeProducts.entries()) {
      if (now - entry.lastSeenTime > AR_TIMEOUT_MS) {
        activeProducts.delete(qrId);
      }
    }

    drawAROverlay();
    requestAnimationFrame(tick);
  }

  /**
   * カメラ起動。facingMode: 'environment' で背面カメラ。
   */
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
      videoEl.srcObject = stream;
      await new Promise(function(resolve, reject) {
        videoEl.onloadedmetadata = resolve;
        videoEl.onerror = reject;
      });
      videoEl.play();
      updateCoordinateTransform();
      loadingEl.style.display = 'none';
      tick();
    } catch (err) {
      loadingEl.innerHTML = '<p class="text-red-400">カメラを利用できません</p>';
      console.error(err);
    }
  }

  window.addEventListener('resize', function() {
    updateCoordinateTransform();
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startCamera);
  } else {
    startCamera();
  }
})();
  </script>
</body>
</html>
