<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>店舗管理 - 商品登録・在庫管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 p-8">
    
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
        
        <div class="w-full lg:w-1/3 bg-white p-6 rounded-lg shadow-md h-fit border-t-4 border-blue-500">
            <h1 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <span>📝</span> 新規商品登録
            </h1>

            <div class="mb-6">
                <p class="text-xs font-bold text-gray-500 mb-2">⚡️ カテゴリから選ぶ（3時間後でセット）</p>
                <div class="flex flex-wrap gap-2 mb-3">
                    <button type="button" onclick="showSubMenu('bento')" class="bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-100 transition-colors">🍱 お弁当</button>
                    <button type="button" onclick="showSubMenu('salad')" class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-emerald-100 transition-colors">🥗 サラダ</button>
                    <button type="button" onclick="showSubMenu('onigiri')" class="bg-slate-50 text-slate-700 border border-slate-200 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-slate-100 transition-colors">🍙 おにぎり</button>
                </div>
                
                <div id="preset-submenu" class="hidden p-3 bg-slate-50 rounded-xl border border-dashed border-slate-300 animate-fade-in">
                    <div id="submenu-title" class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Select Item</div>
                    <div id="submenu-items" class="flex flex-wrap gap-2">
                        </div>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">商品名</label>
                    <input type="text" id="name" list="item-name-list" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="商品名を入力または選択">
                    <datalist id="item-name-list"></datalist>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">定価 (円)</label>
                        <input type="number" id="original_price" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" value="800">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">底値 (円)</label>
                        <input type="number" id="min_price" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" value="400">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">在庫数</label>
                    <input type="number" id="stock" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" value="10">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">消費期限</label>
                    <input type="datetime-local" id="expiry_time" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <button type="button" id="registerBtn" onclick="registerItem(event)" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-all shadow-lg active:transform active:scale-95">
                    登録してQRコードを発行
                </button>
            </div>
        </div>

        <div class="w-full lg:w-2/3 bg-white p-6 rounded-lg shadow-md border-t-4 border-slate-700">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <span>📦</span> 在庫管理（販売中）
                </h2>
                <button onclick="loadInventory()" class="bg-slate-100 text-slate-600 border border-slate-300 px-4 py-2 rounded-lg hover:bg-slate-200 font-bold text-sm transition-all flex items-center gap-2">
                    <span>🔄</span> 更新
                </button>
            </div>
            
            <div id="inventoryContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500 col-span-full font-bold text-center py-10">在庫データを読み込んでいます...</p>
            </div>
        </div>
        
    </div>

    <div id="qrcodeContainer" style="position: absolute; left: -9999px; top: 0;"></div>

    <script src="script.js"></script>
</body>
</html>
