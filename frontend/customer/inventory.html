<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>消費期限の近い在庫一覧 | RescuAR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-6">
    <!-- ヘッダー・統計エリア -->
    <header class="mb-6">
      <a href="index.html" class="inline-flex items-center text-amber-600 font-bold mb-4 hover:opacity-70">
        <span class="mr-1">←</span> ホームに戻る
      </a>
      
      <div class="flex justify-between items-end mb-4">
        <h1 class="text-xl font-bold text-slate-800">お弁当カタログ</h1>
        <select id="sort-select" class="bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-amber-500 focus:border-amber-500 block p-2 shadow-sm outline-none cursor-pointer">
          <option value="recommend">🔥 おすすめ順</option>
          <option value="expiry_asc">⏳ 期限が近い順</option>
          <option value="price_asc">💴 価格が安い順</option>
          <option value="discount_desc">✨ おトク額が大きい順</option>
        </select>
      </div>

      <div class="flex gap-2 overflow-x-auto pb-2 mb-4" style="scrollbar-width: none; -ms-overflow-style: none;">
        <button data-category="all" class="filter-btn bg-amber-500 text-white px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap shadow-sm transition-colors">🍱 すべて</button>
        <button data-category="bento" class="filter-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap hover:bg-slate-50 transition-colors">🍱 お弁当</button>
        <button data-category="salad" class="filter-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap hover:bg-slate-50 transition-colors">🥗 サラダ</button>
        <button data-category="onigiri" class="filter-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap hover:bg-slate-50 transition-colors">🍙 おにぎり</button>
        <button data-category="meat" class="filter-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap hover:bg-slate-50 transition-colors">🥩 お肉</button>
        <button data-category="fish" class="filter-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap hover:bg-slate-50 transition-colors">🐟 お魚</button>
        
        <button data-category="other" class="filter-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap hover:bg-slate-50 transition-colors">🍲 その他</button>
      </div>

      <div id="stats-area" class="bg-white rounded-xl shadow-sm border border-slate-200 px-4 py-3 text-slate-700">
        <span class="font-medium">消費期限が近い商品：</span>
        <span id="total-count" class="text-lg font-bold text-amber-600">0</span>
        <span class="font-medium">個</span>
      </div>
    </header>

    <!-- 商品グリッド（JSで動的挿入） -->
    <main>
      <div id="product-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <!-- inventory.js でカードが挿入される -->
      </div>
    </main>
  </div>

  <script src="inventory.js"></script>
</body>
</html>
