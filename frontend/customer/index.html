<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ホーム | RescuAR</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6">
  
  <div class="text-center mb-10">
    <h1 class="text-4xl font-extrabold text-amber-500 tracking-wider mb-2">RescuAR</h1>
    <p class="text-slate-600 font-medium">おいしく楽しく、フードロス削減</p>
  </div>

  <div class="w-full max-w-sm space-y-4">
    
    <a href="inventory.html" class="block bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-amber-400 hover:shadow-md transition-all group">
      <div class="flex items-center gap-4">
        <div class="text-4xl">🍱</div>
        <div>
          <h2 class="text-lg font-bold text-slate-800 group-hover:text-amber-600 transition-colors">お弁当カタログ</h2>
          <p class="text-sm text-slate-500 mt-1">今おトクになっている<br>商品の一覧を見ます</p>
        </div>
      </div>
    </a>

    <a href="scan.html" class="block bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-amber-400 hover:shadow-md transition-all group">
      <div class="flex items-center gap-4">
        <div class="text-4xl">📷</div>
        <div>
          <h2 class="text-lg font-bold text-slate-800 group-hover:text-amber-600 transition-colors">ARでスキャン</h2>
          <p class="text-sm text-slate-500 mt-1">店頭のQRコードを読んで<br>割引価格をチェックします</p>
        </div>
      </div>
    </a>

  </div>

</body>
</html>
